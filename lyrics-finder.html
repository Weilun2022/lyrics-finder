<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>歌詞搜尋器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --border: #2a2a3f;
    --accent: #7c6af7;
    --accent2: #f76a8a;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --glow: rgba(124, 106, 247, 0.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif TC', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(124,106,247,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 50% 30% at 80% 90%, rgba(247,106,138,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 780px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 48px;
  }

  .logo {
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.4em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 16px;
    opacity: 0.8;
  }

  h1 {
    font-size: clamp(2rem, 6vw, 3.2rem);
    font-weight: 300;
    letter-spacing: -0.02em;
    line-height: 1.1;
    color: var(--text);
  }

  h1 span {
    color: var(--accent);
    font-weight: 700;
  }

  .subtitle {
    margin-top: 12px;
    color: var(--muted);
    font-size: 14px;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.05em;
  }

  /* Mic Section */
  .mic-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    margin-bottom: 40px;
  }

  .mic-wrapper {
    position: relative;
  }

  .mic-btn {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    background: var(--card);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .mic-btn:hover {
    border-color: var(--accent2);
    background: rgba(124,106,247,0.15);
    transform: scale(1.05);
  }

  .mic-btn.recording {
    border-color: var(--accent2);
    background: rgba(247,106,138,0.12);
    animation: pulse-ring 1.5s ease-out infinite;
  }

  .mic-btn svg {
    width: 32px;
    height: 32px;
    transition: transform 0.2s;
  }

  .mic-btn.recording svg {
    transform: scale(1.1);
  }

  @keyframes pulse-ring {
    0% { box-shadow: 0 0 0 0 rgba(247,106,138,0.4); }
    70% { box-shadow: 0 0 0 20px rgba(247,106,138,0); }
    100% { box-shadow: 0 0 0 0 rgba(247,106,138,0); }
  }

  /* Sound wave */
  .wave-bars {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 28px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .wave-bars.active { opacity: 1; }

  .bar {
    width: 4px;
    background: var(--accent2);
    border-radius: 2px;
    animation: wave 0.8s ease-in-out infinite;
    min-height: 4px;
  }
  .bar:nth-child(1) { animation-delay: 0s; }
  .bar:nth-child(2) { animation-delay: 0.1s; }
  .bar:nth-child(3) { animation-delay: 0.2s; }
  .bar:nth-child(4) { animation-delay: 0.3s; }
  .bar:nth-child(5) { animation-delay: 0.2s; }
  .bar:nth-child(6) { animation-delay: 0.1s; }
  .bar:nth-child(7) { animation-delay: 0s; }

  @keyframes wave {
    0%, 100% { height: 4px; }
    50% { height: 24px; }
  }

  .status-text {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-align: center;
    min-height: 18px;
  }

  /* Language selector */
  .lang-selector {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 8px;
  }
  .lang-btn {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.03em;
  }
  .lang-btn:hover { border-color: var(--accent); color: var(--accent); }
  .lang-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* Manual Input */
  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .divider span {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .search-box {
    display: flex;
    gap: 12px;
    margin-bottom: 40px;
  }

  input[type="text"] {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    color: var(--text);
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus {
    border-color: var(--accent);
  }

  input[type="text"]::placeholder {
    color: var(--muted);
    font-size: 14px;
  }

  .search-btn {
    padding: 14px 24px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: white;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .search-btn:hover {
    background: #9080ff;
    transform: translateY(-1px);
  }

  /* Result Card */
  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    display: none;
    animation: slideUp 0.4s ease;
  }

  .result-card.visible { display: block; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .song-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 12px;
  }

  .song-title {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }

  .song-meta {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
  }

  .song-tag {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--accent);
    color: var(--accent);
    letter-spacing: 0.05em;
    white-space: nowrap;
  }

  .lyrics-body {
    line-height: 2;
    font-size: 16px;
    color: var(--text);
    white-space: pre-wrap;
    font-weight: 300;
  }

  .lyrics-body strong {
    color: var(--accent2);
    font-weight: 700;
  }

  /* 推薦歌曲 */
  .recommend-section {
    display: none;
    margin-top: 40px;
    padding-top: 28px;
    border-top: 1px solid var(--border);
  }
  .recommend-section.visible { display: block; }

  .recommend-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.15em;
    margin-bottom: 16px;
  }

  .recommend-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
  }

  .recommend-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .recommend-item:hover {
    border-color: var(--accent);
    background: rgba(124,106,247,0.08);
    transform: translateY(-2px);
  }

  .recommend-cover {
    width: 42px;
    height: 42px;
    border-radius: 6px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--border);
  }

  .recommend-cover-placeholder {
    width: 42px;
    height: 42px;
    border-radius: 6px;
    background: var(--card);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .recommend-info { min-width: 0; }

  .recommend-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .recommend-artist {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Loading */
  .loading {
    text-align: center;
    padding: 48px;
    display: none;
  }

  .loading.visible { display: block; }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loading p {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* Error */
  .error-msg {
    background: rgba(247,106,138,0.08);
    border: 1px solid rgba(247,106,138,0.3);
    border-radius: 10px;
    padding: 16px 20px;
    color: var(--accent2);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    display: none;
    margin-bottom: 16px;
  }
  .error-msg.visible { display: block; }

  /* Transcript box */
  .transcript-box {
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    min-height: 52px;
    display: none;
    margin-bottom: 20px;
  }
  .transcript-box.visible { display: block; }
  .transcript-box span { color: var(--accent); }

  /* Candidate List */
  .candidate-list {
    display: none;
    margin-bottom: 24px;
    animation: slideUp 0.3s ease;
  }
  .candidate-list.visible { display: block; }

  .candidate-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-bottom: 10px;
  }

  .candidate-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.2s;
    gap: 12px;
  }
  .candidate-item:hover {
    border-color: var(--accent);
    background: rgba(124,106,247,0.08);
    transform: translateX(4px);
  }

  .candidate-info { flex: 1; min-width: 0; }

  .candidate-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .candidate-sub {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .candidate-arrow {
    color: var(--accent);
    font-size: 16px;
    flex-shrink: 0;
  }

  /* 來源標籤 */
  .source-tag {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    border: 1px solid;
    flex-shrink: 0;
    letter-spacing: 0.03em;
  }
  .source-tag.netease  { color: #e84d4d; border-color: #e84d4d; }
  .source-tag.genius   { color: #f5c518; border-color: #f5c518; }
  .source-tag.lrclib   { color: #4db8e8; border-color: #4db8e8; }
  .source-tag.lyricsovh { color: #7ec87e; border-color: #7ec87e; }

  /* 浮動搜尋按鈕 */
  .fab-wrap {
    position: fixed;
    bottom: 32px;
    right: 32px;
    z-index: 999;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 10px;
  }

  .fab-search-box {
    display: none;
    background: var(--card);
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    animation: slideUp 0.2s ease;
    width: 280px;
  }
  .fab-search-box.open { display: flex; gap: 8px; }

  .fab-search-box input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
    outline: none;
  }
  .fab-search-box input:focus { border-color: var(--accent); }

  .fab-search-go {
    padding: 10px 14px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .fab-search-go:hover { background: #9080ff; }

  .fab-btn {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    color: white;
    font-size: 22px;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(124,106,247,0.5);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .fab-btn:hover { transform: scale(1.1); background: #9080ff; }
  .fab-btn.active { background: var(--accent2); box-shadow: 0 4px 16px rgba(247,106,138,0.5); }

  @media (max-width: 480px) {
    .song-header { flex-direction: column; }
    .search-box { flex-direction: column; }
    .fab-wrap { bottom: 20px; right: 16px; }
    .fab-search-box { width: 230px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">🎵 Lyrics Finder</div>
    <h1>歌詞<span>搜尋器</span></h1>
    <p class="subtitle">唱幾句 · 找歌詞 · 搭配 AI 辨識</p>
  </header>

  <!-- Mic -->
  <div class="mic-section">
    <div class="mic-wrapper">
      <button class="mic-btn" id="micBtn" title="按住說話">
        <svg id="micIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
    </div>

    <div class="wave-bars" id="waveBars">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div>
    </div>

    <p class="status-text" id="statusText">點擊麥克風開始說唱</p>

    <div class="lang-selector">
      <button class="lang-btn active" data-lang="zh-TW">繁中</button>
      <button class="lang-btn" data-lang="zh-CN">普通話</button>
      <button class="lang-btn" data-lang="en-US">English</button>
      <button class="lang-btn" data-lang="ja-JP">日本語</button>
      <button class="lang-btn" data-lang="ko-KR">한국어</button>
    </div>
  </div>

  <div class="transcript-box" id="transcriptBox">
    識別結果：<span id="transcriptText"></span>
  </div>

  <!-- Manual Search -->
  <div class="divider"><span>或手動輸入</span></div>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="輸入歌名、歌詞片段、或歌手名稱..." />
    <button class="search-btn" id="searchBtn">搜尋</button>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <!-- Candidate list -->
  <div class="candidate-list" id="candidateList">
    <div class="candidate-label">找到多首符合歌曲，請選擇：</div>
    <div id="candidateItems"></div>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>AI 正在搜尋歌詞...</p>
  </div>

  <div class="result-card" id="resultCard">
    <div class="song-header">
      <div>
        <div class="song-title" id="songTitle"></div>
        <div class="song-meta" id="songMeta"></div>
      </div>
      <div class="song-tag" id="songTag">LYRICS</div>
    </div>
    <div class="lyrics-body" id="lyricsBody"></div>

    <!-- 推薦歌曲 -->
    <div class="recommend-section" id="recommendSection">
      <div class="recommend-label">▸ 相似歌曲推薦</div>
      <div class="recommend-grid" id="recommendGrid"></div>
    </div>
  </div>
</div>

<!-- 浮動搜尋按鈕 -->
<div class="fab-wrap">
  <div class="fab-search-box" id="fabSearchBox">
    <input type="text" id="fabInput" placeholder="搜尋新歌曲..." />
    <button class="fab-search-go" id="fabGo">↑</button>
  </div>
  <button class="fab-btn" id="fabBtn" title="搜尋新歌曲">🔍</button>
</div>

<script>
const micBtn = document.getElementById('micBtn');
const waveBars = document.getElementById('waveBars');
const statusText = document.getElementById('statusText');
const transcriptBox = document.getElementById('transcriptBox');
const transcriptText = document.getElementById('transcriptText');
const searchInput = document.getElementById('searchInput');
const searchBtn = document.getElementById('searchBtn');
const loading = document.getElementById('loading');
const errorMsg = document.getElementById('errorMsg');
const resultCard = document.getElementById('resultCard');
const songTitle = document.getElementById('songTitle');
const songMeta = document.getElementById('songMeta');
const lyricsBody = document.getElementById('lyricsBody');
const songTag = document.getElementById('songTag');
const candidateList = document.getElementById('candidateList');
const candidateItems = document.getElementById('candidateItems');
const fabBtn = document.getElementById('fabBtn');
const fabSearchBox = document.getElementById('fabSearchBox');
const fabInput = document.getElementById('fabInput');
const fabGo = document.getElementById('fabGo');

// 浮動按鈕邏輯
fabBtn.addEventListener('click', () => {
  const isOpen = fabSearchBox.classList.toggle('open');
  fabBtn.classList.toggle('active', isOpen);
  if (isOpen) { fabInput.focus(); }
});

function fabSearch() {
  const q = fabInput.value.trim();
  if (!q) return;
  fabSearchBox.classList.remove('open');
  fabBtn.classList.remove('active');
  fabInput.value = '';
  searchInput.value = q;
  window.scrollTo({ top: 0, behavior: 'smooth' });
  setTimeout(() => searchLyrics(q), 400);
}

fabGo.addEventListener('click', fabSearch);
fabInput.addEventListener('keydown', e => { if (e.key === 'Enter') fabSearch(); });

// 點頁面其他地方關閉浮動搜尋
document.addEventListener('click', e => {
  if (!fabBtn.contains(e.target) && !fabSearchBox.contains(e.target)) {
    fabSearchBox.classList.remove('open');
    fabBtn.classList.remove('active');
  }
});

let recognition = null;
let isRecording = false;
let selectedLang = 'zh-TW';

// 語言切換
document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedLang = btn.dataset.lang;
  });
});

// Speech Recognition setup
function setupRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return null;

  const rec = new SpeechRecognition();
  rec.lang = selectedLang;   // 使用選擇的語言
  rec.continuous = false;
  rec.interimResults = true;
  rec.maxAlternatives = 3;   // 取多個候選結果，提升準確率

  rec.onstart = () => {
    isRecording = true;
    micBtn.classList.add('recording');
    waveBars.classList.add('active');
    statusText.textContent = '🎙 正在聆聽，請唱或說出歌詞片段...';
  };

  rec.onresult = (e) => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const result = e.results[i];
      // 取信心度最高的候選
      let bestText = result[0].transcript;
      let bestConf = result[0].confidence || 0;
      for (let j = 1; j < result.length; j++) {
        if ((result[j].confidence || 0) > bestConf) {
          bestConf = result[j].confidence;
          bestText = result[j].transcript;
        }
      }
      if (result.isFinal) final += bestText;
      else interim += bestText;
    }
    const display = final || interim;
    transcriptText.textContent = display;
    transcriptBox.classList.add('visible');
    if (final) searchInput.value = final;
  };

  rec.onend = () => {
    isRecording = false;
    micBtn.classList.remove('recording');
    waveBars.classList.remove('active');
    statusText.textContent = '點擊麥克風開始說唱';

    const q = searchInput.value.trim();
    if (q) {
      setTimeout(() => searchLyrics(q), 300);
    }
  };

  rec.onerror = (e) => {
    isRecording = false;
    micBtn.classList.remove('recording');
    waveBars.classList.remove('active');
    const msgs = {
      'no-speech': '沒有偵測到聲音，請再試一次',
      'not-allowed': '麥克風權限被拒絕，請在瀏覽器設定中允許',
      'network': '網路錯誤，請檢查連線',
    };
    statusText.textContent = msgs[e.error] || '發生錯誤，請重試';
    showError(msgs[e.error] || `語音辨識錯誤：${e.error}`);
  };

  return rec;
}

micBtn.addEventListener('click', () => {
  if (isRecording) {
    recognition?.stop();
    return;
  }
  hideError();
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    showError('您的瀏覽器不支援語音辨識，請使用 Chrome 或 Edge');
    return;
  }
  recognition = setupRecognition();
  try {
    recognition.start();
  } catch(e) {
    showError('無法啟動麥克風，請確認瀏覽器已允許存取');
  }
});

searchBtn.addEventListener('click', () => {
  const q = searchInput.value.trim();
  if (q) searchLyrics(q);
});

searchInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const q = searchInput.value.trim();
    if (q) searchLyrics(q);
  }
});

const GENIUS_TOKEN = 'K-K44OiHSCZXCHPVbiS4bBg0k4AChJdv6VHBXfjcD8_LxwLcpfPSQlPNNDsNHVtn';
const WORKER_URL = 'https://lyrics-proxy.evilscheme2012.workers.dev';
const recommendSection = document.getElementById('recommendSection');
const recommendGrid    = document.getElementById('recommendGrid');

async function searchLyrics(query) {
  hideError();
  resultCard.classList.remove('visible');
  hideCandidates();
  recommendSection.classList.remove('visible');
  recommendGrid.innerHTML = '';
  loading.classList.add('visible');

  // 同時向四個來源拿候選清單（網易雲優先處理中文歌）
  const [neteaseCandidates, geniusCandidates, lrclibCandidates, ovhCandidates] = await Promise.all([
    fetchNetEaseCandidates(query),
    fetchGeniusCandidates(query),
    fetchLrclibCandidates(query),
    fetchOvhCandidates(query)
  ]);

  loading.classList.remove('visible');

  // 合併去重（以 title+artist 為 key）
  const seen = new Set();
  const all = [...neteaseCandidates, ...geniusCandidates, ...lrclibCandidates, ...ovhCandidates].filter(c => {
    const key = `${c.title}||${c.artist}`.toLowerCase();
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  if (all.length === 0) {
    showError('找不到符合的歌曲，建議輸入歌名、歌手名或歌詞片段');
    return;
  }

  if (all.length === 1) {
    await loadAndDisplay(all[0]);
    return;
  }

  showCandidates(all.slice(0, 12));
}

// ── API 0：網易雲音樂（大陸中文歌最佳來源）──
async function fetchNetEaseCandidates(query) {
  try {
    // 搜尋網易雲時自動轉簡體，避免繁體字找不到大陸歌
    const simplifiedQuery = toSimplified(query);
    const res = await fetch(`${WORKER_URL}?netease_search=${encodeURIComponent(simplifiedQuery)}`);
    if (!res.ok) return [];
    const data = await res.json();
    return (data.songs || []).map(s => ({
      title: s.title || '未知歌曲',
      artist: s.artist || '未知歌手',
      album: s.album || '',
      coverUrl: '',
      source: 'netease',
      _raw: { id: s.id }
    }));
  } catch { return []; }
}

// ── API 1：Genius（透過 Worker 全文搜尋，含歌詞內容）──
async function fetchGeniusCandidates(query) {
  try {
    const res = await fetch(`${WORKER_URL}?search=${encodeURIComponent(query)}`);
    if (!res.ok) return [];
    const data = await res.json();
    return (data.songs || []).map(s => ({
      title: s.title || '未知歌曲',
      artist: s.artist || '未知歌手',
      album: '',
      coverUrl: s.coverUrl || '',
      source: 'genius',
      _raw: { url: s.url }
    }));
  } catch { return []; }
}

// ── API 2：lrclib.net（中英日通用）──
async function fetchLrclibCandidates(query) {
  try {
    const res = await fetch(`https://lrclib.net/api/search?q=${encodeURIComponent(query)}`);
    if (!res.ok) return [];
    const data = await res.json();
    if (!Array.isArray(data)) return [];
    return data
      .filter(s => {
        if (!s.plainLyrics && !s.syncedLyrics) return false;
        const title = s.trackName || '';
        // 過濾標題太長或含中文標點的（通常是歌詞片段被誤植為歌名）
        if (title.length > 30) return false;
        if (title.includes('，') || title.includes('。') || title.includes('、')) return false;
        return true;
      })
      .slice(0, 5)
      .map(s => ({
        title: s.trackName || '未知歌曲',
        artist: s.artistName || '未知歌手',
        album: s.albumName || '',
        coverUrl: '',
        source: 'lrclib',
        _raw: s
      }));
  } catch { return []; }
}

// ── API 3：lyrics.ovh（英文備援）──
async function fetchOvhCandidates(query) {
  try {
    const res = await fetch(`https://api.lyrics.ovh/suggest/${encodeURIComponent(query)}`);
    if (!res.ok) return [];
    const data = await res.json();
    if (!data.data) return [];
    return data.data.slice(0, 4).map(s => ({
      title: s.title || '未知歌曲',
      artist: s.artist?.name || '未知歌手',
      album: s.album?.title || '',
      coverUrl: '',
      source: 'lyrics.ovh',
      _raw: s
    }));
  } catch { return []; }
}

const SOURCE_LABEL = {
  'netease':   { text: '網易雲', cls: 'netease' },
  'genius':    { text: 'Genius', cls: 'genius' },
  'lrclib':    { text: 'LRCLib', cls: 'lrclib' },
  'lyrics.ovh':{ text: 'OVH',    cls: 'lyricsovh' },
};

// ── 顯示候選清單 ──
function showCandidates(candidates) {
  candidateItems.innerHTML = '';
  candidates.forEach(c => {
    const label = SOURCE_LABEL[c.source] || { text: c.source, cls: 'lrclib' };
    const item = document.createElement('div');
    item.className = 'candidate-item';
    item.innerHTML = `
      <div class="candidate-info">
        <div class="candidate-title">${escapeHtml(c.title)}</div>
        <div class="candidate-sub">${escapeHtml(c.artist)}${c.album ? '　·　' + escapeHtml(c.album) : ''}</div>
      </div>
      <span class="source-tag ${label.cls}">${label.text}</span>
      <div class="candidate-arrow">›</div>
    `;
    item.addEventListener('click', async () => {
      hideCandidates();
      loading.classList.add('visible');
      await loadAndDisplay(c);
      loading.classList.remove('visible');
    });
    candidateItems.appendChild(item);
  });
  candidateList.classList.add('visible');
}

function hideCandidates() {
  candidateList.classList.remove('visible');
  candidateItems.innerHTML = '';
}

// 判斷歌詞是否足夠完整（至少 5 行非空白）
function isLyricsComplete(text) {
  if (!text) return false;
  const lines = text.split('\n').filter(l => l.trim().length > 0);
  return lines.length >= 5;
}

// ── 載入歌詞並顯示 ──
async function loadAndDisplay(candidate) {
  loading.classList.add('visible');
  let lyrics = '';

  if (candidate.source === 'netease') {
    if (candidate._raw?.id) {
      try {
        const res = await fetch(`${WORKER_URL}?netease_id=${candidate._raw.id}`);
        const data = await res.json();
        lyrics = data.lyrics || '';
      } catch {}
    }
    // 網易雲歌詞不完整，用歌名+歌手去 Genius 搜尋
    if (!isLyricsComplete(lyrics)) lyrics = await fetchLyricsFromGeniusSearch(candidate.title, candidate.artist);
    if (!isLyricsComplete(lyrics)) lyrics = await fetchLyricsFromLrclib(candidate.title, candidate.artist);
  } else if (candidate.source === 'lrclib') {
    const s = candidate._raw;
    lyrics = s.plainLyrics || s.syncedLyrics?.replace(/\[\d+:\d+\.\d+\]/g, '').trim() || '';
  } else if (candidate.source === 'genius') {
    if (candidate._raw?.url) {
      lyrics = await fetchLyricsFromWorker(candidate._raw.url);
    }
    if (!isLyricsComplete(lyrics)) lyrics = await fetchLyricsFromLrclib(candidate.title, candidate.artist);
    if (!isLyricsComplete(lyrics)) lyrics = await fetchLyricsFromOvh(candidate.title, candidate.artist);
  } else {
    lyrics = await fetchLyricsFromOvh(candidate.title, candidate.artist);
    if (!isLyricsComplete(lyrics)) lyrics = await fetchLyricsFromLrclib(candidate.title, candidate.artist);
  }

  loading.classList.remove('visible');

  if (!isLyricsComplete(lyrics)) {
    showError(`找不到「${candidate.title}」的完整歌詞，請試試其他來源的同名歌曲`);
    return;
  }

  displayResult({
    title: candidate.title,
    artist: candidate.artist,
    album: candidate.album,
    coverUrl: candidate.coverUrl || '',
    language: detectLanguage(lyrics),
    year: candidate._raw?.release_date_components?.year || candidate._raw?.album?.release_date?.slice(0, 4) || '',
    lyrics: toTraditional(lyrics)
  });

  // 若來自網易雲，非同步載入相似歌曲推薦
  if (candidate.source === 'netease' && candidate._raw?.id) {
    fetchAndShowRecommendations(candidate._raw.id);
  }
}

// ── 用歌名+歌手搜尋 Genius 並抓歌詞 ──
async function fetchLyricsFromGeniusSearch(title, artist) {
  try {
    const res = await fetch(`${WORKER_URL}?search=${encodeURIComponent(title + ' ' + artist)}`);
    if (!res.ok) return '';
    const data = await res.json();
    const songs = data.songs || [];
    if (songs.length === 0) return '';
    // 取第一筆有 url 的結果去抓歌詞
    const song = songs.find(s => s.url) || songs[0];
    if (!song?.url) return '';
    return await fetchLyricsFromWorker(song.url);
  } catch { return ''; }
}

// ── Cloudflare Worker：直接抓 Genius 歌詞（支援中文）──
async function fetchLyricsFromWorker(geniusUrl) {
  try {
    const res = await fetch(`${WORKER_URL}?url=${encodeURIComponent(geniusUrl)}`);
    if (!res.ok) return '';
    const data = await res.json();
    return data.lyrics || '';
  } catch { return ''; }
}

async function fetchLyricsFromLrclib(title, artist) {
  try {
    const res = await fetch(
      `https://lrclib.net/api/search?track_name=${encodeURIComponent(title)}&artist_name=${encodeURIComponent(artist)}`
    );
    if (!res.ok) return '';
    const data = await res.json();
    if (!Array.isArray(data) || data.length === 0) return '';
    const s = data[0];
    return s.plainLyrics || s.syncedLyrics?.replace(/\[\d+:\d+\.\d+\]/g, '').trim() || '';
  } catch { return ''; }
}

async function fetchLyricsFromOvh(title, artist) {
  try {
    const r = await fetch(`https://api.lyrics.ovh/v1/${encodeURIComponent(artist)}/${encodeURIComponent(title)}`);
    const d = await r.json();
    return d.lyrics || '';
  } catch { return ''; }
}

// 繁體轉簡體（只用於搜尋網易雲，Worker 負責轉回繁體）
function toSimplified(text) {
  if (!text) return text;
  // 常用繁→簡對照（僅用於搜尋關鍵字）
  const map = {'體':'体','語':'语','詞':'词','臺':'台','灣':'湾','學':'学','國':'国','來':'来','說':'说','會':'会','時':'时','對':'对','愛':'爱','樂':'乐','這':'这','個':'个','為':'为','從':'从','與':'与','發':'发','無':'无','萬':'万','東':'东','點':'点','裡':'里','還':'还','後':'后','們':'们','親':'亲','過':'过','進':'进','馬':'马','頭':'头','讓':'让','電':'电','門':'门','問':'问','開':'开','現':'现','書':'书','車':'车','長':'长','機':'机','場':'场','風':'风','飛':'飞','號':'号','熱':'热','漢':'汉','聽':'听','邊':'边','傳':'传','歲':'岁'};
  return text.split('').map(c => map[c] || c).join('');
}

function toTraditional(text) { return text; } // Worker 已處理轉換

function detectLanguage(text) {
  if (!text) return '';
  const cjk = (text.match(/[\u4e00-\u9fff]/g) || []).length;
  const jp  = (text.match(/[\u3040-\u30ff]/g) || []).length;
  const total = text.replace(/\s/g, '').length;
  if (total === 0) return '';
  if (cjk / total > 0.2) return '中文';
  if (jp / total > 0.1) return '日文';
  return '英文';
}

function displayResult(info) {
  songTitle.textContent = toTraditional(info.title) || '未知歌曲';
  songMeta.textContent = [
    info.artist && `🎤 ${toTraditional(info.artist)}`,
    info.album && `💿 ${toTraditional(info.album)}`,
    info.year && `📅 ${info.year}`,
    info.language && `🌐 ${info.language}`,
  ].filter(Boolean).join('   ·   ');

  // 封面圖（Genius 提供）
  const existingCover = document.getElementById('songCover');
  if (existingCover) existingCover.remove();
  if (info.coverUrl) {
    const img = document.createElement('img');
    img.id = 'songCover';
    img.src = info.coverUrl;
    img.alt = 'cover';
    img.style.cssText = 'width:64px;height:64px;border-radius:8px;object-fit:cover;flex-shrink:0;';
    const header = document.querySelector('.song-header');
    header.insertBefore(img, header.firstChild);
  }

  songTag.textContent = info.language || 'LYRICS';

  const rawLyrics = info.lyrics || '（找不到歌詞）';
  lyricsBody.innerHTML = rawLyrics
    .split('\n')
    .map(line => line.trim() ? `<p>${escapeHtml(line)}</p>` : '<p style="height:0.8em"></p>')
    .join('');

  resultCard.classList.add('visible');
  resultCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── 相似歌曲推薦（網易雲）──
async function fetchAndShowRecommendations(neId) {
  recommendSection.classList.remove('visible');
  recommendGrid.innerHTML = '';
  try {
    const res = await fetch(`${WORKER_URL}?netease_similar=${neId}`);
    if (!res.ok) return;
    const data = await res.json();
    const songs = data.songs || [];
    if (songs.length === 0) return;

    recommendGrid.innerHTML = '';
    songs.forEach(song => {
      const item = document.createElement('div');
      item.className = 'recommend-item';
      item.title = `${song.title} — ${song.artist}`;

      const coverHtml = song.coverUrl
        ? `<img class="recommend-cover" src="${escapeHtml(song.coverUrl)}" alt="cover" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display='flex'">`
          + `<div class="recommend-cover-placeholder" style="display:none">🎵</div>`
        : `<div class="recommend-cover-placeholder">🎵</div>`;

      item.innerHTML = `
        ${coverHtml}
        <div class="recommend-info">
          <div class="recommend-title">${escapeHtml(song.title)}</div>
          <div class="recommend-artist">${escapeHtml(song.artist)}</div>
        </div>`;

      item.addEventListener('click', async () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
        hideCandidates();
        hideError();
        await loadAndDisplay({
          source: 'netease',
          title: song.title,
          artist: song.artist,
          album: song.album,
          coverUrl: song.coverUrl,
          _raw: { id: song.id }
        });
      });

      recommendGrid.appendChild(item);
    });

    recommendSection.classList.add('visible');
  } catch (e) {
    // 靜默失敗，不影響主歌詞顯示
  }
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showError(msg) {
  errorMsg.textContent = msg;
  errorMsg.classList.add('visible');
}

function hideError() {
  errorMsg.classList.remove('visible');
}
